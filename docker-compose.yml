version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - REACT_APP_API_URL=http://model-server:8000

  model-server:
    build:
      context: ./model-server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
